services:
  postgres:
    image: postgres:17-alpine
    container_name: wedding-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wedding_planner
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wedding -d wedding_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: wedding-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: wedding-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/wedding-files --ignore-existing;
      echo 'Bucket wedding-files created successfully';
      "

  backend:
    build: .
    container_name: wedding-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USERNAME: wedding
      DB_PASSWORD: wedding
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  miniodata:
