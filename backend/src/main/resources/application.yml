spring:
  application:
    name: wedding-planner
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/wedding_planner
    username: ${DB_USERNAME:wedding}
    password: ${DB_PASSWORD:wedding}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1mb3ItZGV2LW9ubHktZG8tbm90LXVzZS1pbi1wcm9k}
  expiration: 86400000
  refresh-expiration: 604800000

aws:
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:wedding-files}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT:firebase-service-account.json}

google:
  client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}

apple:
  client-id: ${APPLE_CLIENT_ID:your-apple-client-id}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
